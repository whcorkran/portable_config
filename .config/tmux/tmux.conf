##### TPM #####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'niksingh710/minimal-tmux-status'

##### Terminal / Color #####
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:Tc"
set -s escape-time 0

# keybindings for faster navigation
set-option -g xterm-keys on
set-option -g extended-keys on

##### Environment #####
set -g update-environment "PATH DISPLAY WAYLAND_DISPLAY SSH_AUTH_SOCK XDG_RUNTIME_DIR"

##### UI / Behavior #####
set -g allow-passthrough on
set -g mouse on
unbind C-b

set -g prefix C-Space
bind C-Space send-prefix

bind -n M-w next-window
bind f resize-pane -Z

# fix cursor on exit
set -ga terminal-overrides ',*:Ss=\E[%p1%d q:Se=\E[ q'

##### Indexing #####
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g pane-border-lines single

##### Splits #####
bind | split-window -h -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}"

##### Windows #####
# Create new window with current path
bind c new-window -c "#{pane_current_path}"

# Quick window switching
bind -n M-q previous-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Swap windows left/right
bind -r "<" swap-window -t -1 -d
bind -r ">" swap-window -t +1 -d

##### Status #####
# Safe color (no undefined vars)
set -g status-left "#[fg=colour245,bold] %H:%M #[default]"

##### Vim-aware navigation #####
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"

bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

##### Copy Mode (Vi-style) #####
# Use vi keybindings
setw -g mode-keys vi

# Enter copy mode
bind Enter copy-mode

# Vi-style selection and copy
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi Escape send-keys -X cancel

# Cross-platform clipboard integration
# macOS: uses pbcopy
# Linux Wayland: uses wl-copy
# Linux X11: uses xclip
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "if-shell '[ -n \"$WAYLAND_DISPLAY\" ]' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"xclip -selection clipboard\"'"

# Mouse drag also copies to clipboard (same cross-platform logic)
if-shell "uname | grep -q Darwin" \
  "bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'pbcopy'" \
  "if-shell '[ -n \"$WAYLAND_DISPLAY\" ]' \
    'bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \"wl-copy\"' \
    'bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel \"xclip -selection clipboard\"'"

##### Session Management #####
# Quick session switching
bind C-j switch-client -n
bind C-k switch-client -p

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "✓ Config reloaded!"

##### History & Display #####
set -g history-limit 20000
set -g display-panes-time 2000
set -g display-time 2000

##### Activity Monitoring #####
setw -g monitor-activity on
set -g visual-activity off

##### Copy-mode pane nav #####
bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

##### TPM init (MUST be last) #####
run "~/.config/tmux/plugins/tpm/tpm"
